[phases.setup]
nixPkgs = ["php84", "php84Extensions.pdo", "php84Extensions.pdo_sqlite", "php84Extensions.mbstring", "php84Extensions.zip", "php84Extensions.gd", "composer", "nodejs_22", "sqlite"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader",
  "npm ci"
]

[phases.build]
cmds = [
  "npm run build",
  "php artisan config:clear",
  "php artisan cache:clear"
]

[start]
cmd = "bash docker-entrypoint.sh"